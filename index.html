<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>簡易MindMap神器</title>
  
  <!-- 載入 Tailwind CSS 用作排版美化 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 核心庫 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 載入 Babel 實時翻譯 JSX 程式碼 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 載入 html2canvas 截圖工具 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    /* 隱藏預設捲軸，統一使用觸控或滑鼠拖拉，防止畫面回彈 */
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; touch-action: none; background-color: #fafaf9; }
    textarea { font-family: inherit; resize: none; overflow: hidden; }
  </style>
</head>
<body>
  <!-- React 應用程式的掛載點 -->
  <div id="root"></div>

  <!-- React 程式碼寫喺度 -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // --- Icons ---
    const AddIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const TrashIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
    const DownloadIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
    const CenterIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="12" cy="12" r="3"></circle></svg>;
    const ZoomInIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>;
    const ZoomOutIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>;

    // 層級顏色定義
    const LEVEL_COLORS = [
      { bg: 'bg-amber-100', border: 'border-amber-300', ring: 'ring-amber-400' },     // Level 0: 中心主題
      { bg: 'bg-sky-100', border: 'border-sky-300', ring: 'ring-sky-400' },           // Level 1: 第一分支
      { bg: 'bg-emerald-100', border: 'border-emerald-300', ring: 'ring-emerald-400' }, // Level 2: 第二分支
      { bg: 'bg-purple-100', border: 'border-purple-300', ring: 'ring-purple-400' },    // Level 3: 第三分支
      { bg: 'bg-rose-100', border: 'border-rose-300', ring: 'ring-rose-400' }           // Level 4+: 第四分支
    ];

    // 【修復1】計算節點的實際寬度和高度
    const calculateNodeDimensions = (text, isRoot) => {
      // 根據文字長度估算寬度（每個字符約 10-12px）
      const charWidth = 11;
      const baseWidth = Math.max(120, text.length * charWidth + 24);
      const maxWidth = 500; // 增加最大寬度，允許更長的文字
      const width = Math.min(baseWidth, maxWidth);
      
      // 高度估算
      const lineHeight = isRoot ? 32 : 28;
      const lines = Math.ceil(text.length * charWidth / width);
      const height = Math.max(lineHeight, lines * lineHeight + 24);
      
      return { width, height };
    };

    function App() {
      const [nodes, setNodes] = useState([
        { id: 'root', text: '中心主題', parentId: null, x: 0, y: 0, depth: 0 }
      ]);
      const [selectedId, setSelectedId] = useState(null);
      const [isExporting, setIsExporting] = useState(false);

      const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
      const [dragInfo, setDragInfo] = useState(null);

      useEffect(() => {
        centerView();
      }, []);

      useEffect(() => {
        if (!dragInfo) return;

        const handlePointerMove = (e) => {
          e.preventDefault();
          const dx = e.clientX - dragInfo.startX;
          const dy = e.clientY - dragInfo.startY;

          if (dragInfo.type === 'bg') {
            setTransform(prev => ({
              ...prev,
              x: dragInfo.initPosX + dx,
              y: dragInfo.initPosY + dy
            }));
          } else if (dragInfo.type === 'node') {
            const scaleDx = dx / transform.scale;
            const scaleDy = dy / transform.scale;
            setNodes(prev => prev.map(n => 
              n.id === dragInfo.id 
                ? { ...n, x: dragInfo.initNodeX + scaleDx, y: dragInfo.initNodeY + scaleDy }
                : n
            ));
          }
        };

        const handlePointerUp = () => setDragInfo(null);

        window.addEventListener('pointermove', handlePointerMove, { passive: false });
        window.addEventListener('pointerup', handlePointerUp);
        return () => {
          window.removeEventListener('pointermove', handlePointerMove);
          window.removeEventListener('pointerup', handlePointerUp);
        };
      }, [dragInfo, transform.scale]);

      const generateId = () => Math.random().toString(36).substr(2, 9);

      const centerView = () => {
        if (typeof window !== 'undefined') {
          setTransform({ x: window.innerWidth / 2, y: window.innerHeight / 2, scale: 1 });
        }
      };

      const handleZoom = (factor) => {
        setTransform(prev => ({ ...prev, scale: Math.max(0.2, Math.min(prev.scale + factor, 2.5)) }));
      };

      const addChild = (parentId, e) => {
        e.stopPropagation();
        const parent = nodes.find(n => n.id === parentId);
        const parentDepth = parent.depth || 0;
        
        let newX = parent.x + 200; 
        let newY = parent.y;

        let collision = true;
        let attempts = 0;
        
        while (collision && attempts < 20) {
          collision = nodes.some(n => Math.abs(n.x - newX) < 160 && Math.abs(n.y - newY) < 90);
          if (collision) {
            newY += 100;
          }
          attempts++;
        }

        const newNode = { 
          id: generateId(), 
          text: '新分支', 
          parentId, 
          x: newX, 
          y: newY,
          depth: parentDepth + 1
        };
        
        setNodes([...nodes, newNode]);
        setSelectedId(newNode.id);
      };

      const deleteNode = (id, e) => {
        e.stopPropagation();
        if (id === 'root') return;
        const getChildrenIds = (parentId) => {
          const children = nodes.filter(n => n.parentId === parentId);
          let ids = children.map(c => c.id);
          children.forEach(c => { ids = [...ids, ...getChildrenIds(c.id)]; });
          return ids;
        };
        const idsToDelete = [id, ...getChildrenIds(id)];
        setNodes(nodes.filter(n => !idsToDelete.includes(n.id)));
        setSelectedId(null);
      };

      const updateText = (id, text) => {
        setNodes(nodes.map(n => n.id === id ? { ...n, text } : n));
      };

      const handlePointerDownBg = (e) => {
        if (e.target.closest('.mindmap-node')) return;
        setDragInfo({ type: 'bg', startX: e.clientX, startY: e.clientY, initPosX: transform.x, initPosY: transform.y });
        setSelectedId(null);
      };

      const handlePointerDownNode = (e, id) => {
        e.stopPropagation();
        const node = nodes.find(n => n.id === id);
        setDragInfo({ type: 'node', id, startX: e.clientX, startY: e.clientY, initNodeX: node.x, initNodeY: node.y });
        setSelectedId(id);
      };

      const exportToImage = async () => {
        if (!window.html2canvas) {
          alert("⚠️ 截圖工具載入中，請稍後再試！");
          return;
        }
        
        setIsExporting(true);
        setSelectedId(null);

        setTimeout(async () => {
          try {
            const padding = 120; // 預留多啲邊界，等張圖靚啲
            
            // 【修復1】計算每個節點的實際邊界，包括寬度和高度
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            
            nodes.forEach(node => {
              const isRoot = node.id === 'root';
              const { width, height } = calculateNodeDimensions(node.text, isRoot);
              
              const nodeLeft = node.x - width / 2;
              const nodeRight = node.x + width / 2;
              const nodeTop = node.y - height / 2;
              const nodeBottom = node.y + height / 2;
              
              minX = Math.min(minX, nodeLeft);
              maxX = Math.max(maxX, nodeRight);
              minY = Math.min(minY, nodeTop);
              maxY = Math.max(maxY, nodeBottom);
            });
            
            minX -= padding;
            minY -= padding;
            maxX += padding;
            maxY += padding;
            
            const width = Math.max(maxX - minX, 400);
            const height = Math.max(maxY - minY, 400);

            const originalCanvas = document.getElementById('mindmap-canvas-inner');
            const cloneCanvas = originalCanvas.cloneNode(true);
            
            cloneCanvas.style.position = 'absolute';
            cloneCanvas.style.left = '-9999px';
            cloneCanvas.style.top = '0';
            cloneCanvas.style.transform = `translate(${-minX}px, ${-minY}px) scale(1)`;
            cloneCanvas.style.width = `${width}px`;
            cloneCanvas.style.height = `${height}px`;
            cloneCanvas.style.transformOrigin = 'top left';
            
            // 【修復1】確保 textarea 內容被正確複製
            const originalTextareas = originalCanvas.querySelectorAll('textarea');
            const clonedTextareas = cloneCanvas.querySelectorAll('textarea');
            originalTextareas.forEach((orig, index) => {
                clonedTextareas[index].innerHTML = orig.value || orig.placeholder;
                clonedTextareas[index].value = orig.value || orig.placeholder;
            });

            const buttons = cloneCanvas.querySelectorAll('button');
            buttons.forEach(btn => btn.style.display = 'none');

            document.body.appendChild(cloneCanvas);

            // 智能縮放引擎 (Auto-Scale Engine)
            let safeScale = window.devicePixelRatio > 1 ? 2 : 1; 
            const MAX_SAFE_DIMENSION = 3500; 
            const currentMaxSize = Math.max(width, height) * safeScale;

            if (currentMaxSize > MAX_SAFE_DIMENSION) {
                safeScale = MAX_SAFE_DIMENSION / Math.max(width, height);
                if (safeScale < 0.5) safeScale = 0.5;
            }

            const canvas = await window.html2canvas(cloneCanvas, {
              backgroundColor: '#fafaf9',
              scale: safeScale, 
              width: width,
              height: height,
              logging: false,
              useCORS: true
            });
            
            document.body.removeChild(cloneCanvas);
            
            const dataUrl = canvas.toDataURL('image/png');
            if (dataUrl === 'data:,') {
               throw new Error("產生圖片為空");
            }
            
            const link = document.createElement('a');
            link.download = `MindMap_${new Date().getTime()}.png`;
            link.href = dataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
          } catch (error) {
            console.error("截圖失敗:", error);
            alert("⚠️ 儲存發生少少問題，請再試一次！");
          } finally {
            setIsExporting(false);
          }
        }, 300);
      };

      return (
        <div className="fixed inset-0 w-full flex flex-col bg-[#fafaf9] font-sans text-slate-800 overflow-hidden touch-none z-50">
          
          <div className="bg-white px-4 md:px-6 py-3 md:py-4 shadow-sm border-b border-slate-200 flex justify-between items-center z-20 shrink-0">
            <div>
              <h1 className="text-lg md:text-2xl font-bold flex items-center gap-1 md:gap-2 text-slate-800">
                <span className="text-amber-500 text-xl md:text-3xl">✨</span> MindMap神器
              </h1>
              <p className="hidden md:block text-sm text-slate-500 mt-1">自由拖拉・自動擴大・無限畫布</p>
            </div>
            
            <button 
              onClick={exportToImage}
              disabled={isExporting}
              className={`
                flex items-center gap-2 px-4 md:px-6 py-2 md:py-3 rounded-full font-bold text-sm md:text-lg text-white shadow-md transition-all
                ${isExporting ? 'bg-slate-400' : 'bg-gradient-to-r from-amber-400 to-orange-500 hover:shadow-lg hover:-translate-y-0.5'}
              `}
            >
              {isExporting ? (
                 <svg className="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                 </svg>
              ) : <DownloadIcon />}
              <span className="hidden md:inline">{isExporting ? '處理中...' : '一鍵出圖 (儲存)'}</span>
              <span className="md:hidden">{isExporting ? '處理中...' : '出圖'}</span>
            </button>
          </div>

          <div 
            className="flex-1 w-full h-full relative cursor-grab active:cursor-grabbing overflow-hidden"
            onPointerDown={handlePointerDownBg}
          >
            <div 
              id="mindmap-canvas-inner"
              className="absolute top-0 left-0 origin-top-left"
              style={{ transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})` }}
            >
              <svg className="absolute top-0 left-0 overflow-visible z-0 pointer-events-none">
                {nodes.map(node => {
                  if (!node.parentId) return null;
                  const parent = nodes.find(n => n.id === node.parentId);
                  if (!parent) return null;
                  return (
                    <path
                      key={`line-${node.id}`}
                      d={`M ${parent.x} ${parent.y} C ${parent.x + (node.x - parent.x)/2} ${parent.y}
                         ${parent.x + (node.x - parent.x)/2} ${node.y}
                         ${node.x} ${node.y}`}
                      stroke="#cbd5e1"
                      strokeWidth="4"
                      fill="none"
                      strokeLinecap="round"
                    />
                  );
                })}
              </svg>

              {nodes.map(node => {
                const isSelected = selectedId === node.id;
                const isRoot = node.id === 'root';
                const colorTheme = LEVEL_COLORS[Math.min(node.depth || 0, LEVEL_COLORS.length - 1)];
                
                // 【修復2】動態計算節點寬度
                const { width: nodeWidth, height: nodeHeight } = calculateNodeDimensions(node.text, isRoot);

                return (
                  <div
                    key={node.id}
                    className="mindmap-node absolute z-10"
                    style={{ 
                      left: node.x, 
                      top: node.y, 
                      transform: 'translate(-50%, -50%)' 
                    }}
                    onPointerDown={(e) => handlePointerDownNode(e, node.id)}
                    onClick={(e) => { e.stopPropagation(); setSelectedId(node.id); }}
                  >
                    <div className={`
                      relative p-3 md:p-4 transition-shadow duration-200
                      border-2 rounded-2xl flex flex-col items-center justify-center
                      ${colorTheme.bg} ${colorTheme.border}
                      ${isSelected ? `ring-4 ${colorTheme.ring}` : 'hover:shadow-md cursor-pointer'}
                      ${isRoot ? 'shadow-md' : 'shadow-sm'}
                    `}
                    style={{
                      width: `${nodeWidth}px`,
                      height: `${nodeHeight}px`,
                      minWidth: '120px'
                    }}>
                      
                      <div style={{ display: 'grid', alignItems: 'center', justifyItems: 'center', width: '100%', height: '100%' }}>
                        
                        {/* 【修復2】隱藏的 span 用於測量實際文字寬度 */}
                        <span 
                          className={isRoot ? 'text-xl md:text-2xl font-bold' : 'text-lg md:text-xl font-bold'}
                          style={{ 
                            visibility: 'hidden', 
                            gridArea: '1/1', 
                            whiteSpace: 'pre-wrap', 
                            wordBreak: 'break-word',       
                            overflowWrap: 'break-word',
                            textAlign: 'center',
                            padding: '12px',
                            margin: '0',
                            width: '100%'
                          }}
                        >
                          {node.text}
                        </span>
                        
                        <textarea
                          value={node.text}
                          rows={1}
                          onFocus={(e) => {
                            if (node.text === '中心主題' || node.text === '新分支') {
                              updateText(node.id, '');
                            }
                          }}
                          onBlur={(e) => {
                            if (node.text.trim() === '') {
                              updateText(node.id, isRoot ? '中心主題' : '新分支');
                            }
                          }}
                          onChange={(e) => updateText(node.id, e.target.value)}
                          className={`
                            bg-transparent outline-none text-center font-bold text-slate-800 leading-normal
                            ${isRoot ? 'text-xl md:text-2xl' : 'text-lg md:text-xl'}
                          `}
                          style={{ 
                            gridArea: '1/1', 
                            width: '100%', 
                            height: '100%',
                            wordBreak: 'break-word', 
                            overflowWrap: 'break-word',
                            padding: '12px', 
                            margin: '0', 
                            border: 'none',
                            resize: 'none',
                            overflow: 'hidden'
                          }}
                          placeholder="點擊打字"
                        />
                      </div>

                      {isSelected && !isExporting && (
                        <div className="absolute -bottom-16 left-1/2 -translate-x-1/2 flex gap-2 md:gap-3 bg-white px-3 py-2 rounded-full shadow-lg border border-slate-100 z-50">
                          <button 
                            onClick={(e) => addChild(node.id, e)}
                            className="flex items-center gap-1 text-emerald-600 hover:text-emerald-700 font-bold text-sm md:text-lg bg-emerald-50 px-2 md:px-3 py-1 rounded-full whitespace-nowrap"
                          >
                            <AddIcon /> 新增
                          </button>
                          {!isRoot && (
                            <button 
                              onClick={(e) => deleteNode(node.id, e)}
                              className="flex items-center gap-1 text-rose-500 hover:text-rose-600 font-bold text-sm md:text-lg bg-rose-50 px-2 md:px-3 py-1 rounded-full whitespace-nowrap"
                            >
                              <TrashIcon /> 刪除
                            </button>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {!isExporting && (
            <div className="absolute bottom-6 md:bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-4 bg-white/95 backdrop-blur-md px-6 py-3 rounded-full shadow-[0_4px_20px_rgba(0,0,0,0.15)] border border-slate-200 z-50">
              <button onClick={() => handleZoom(-0.2)} className="p-2 text-slate-600 hover:text-amber-500 hover:bg-amber-50 rounded-full transition" title="縮小">
                <ZoomOutIcon />
              </button>
              <div className="w-px h-6 bg-slate-300"></div>
              <button onClick={centerView} className="flex items-center gap-1 font-bold text-slate-600 hover:text-amber-500 transition px-2" title="置中">
                <CenterIcon /> 置中
              </button>
              <div className="w-px h-6 bg-slate-300"></div>
              <button onClick={() => handleZoom(0.2)} className="p-2 text-slate-600 hover:text-amber-500 hover:bg-amber-50 rounded-full transition" title="放大">
                <ZoomInIcon />
              </button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
